---
name: "Lint"
permissions:
  contents: "read"
on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "*"
jobs:
  lint:
    name: "Lint"
    runs-on: "depot-ubuntu-24.04-small"
    steps:
      - uses: "actions/checkout@v6"
      - uses: "actions/setup-node@v6"
        with:
          node-version: "24"
      - uses: "pnpm/action-setup@v6"
        with:
          cache: true
          run_install: true
      - name: "Run format"
        run: "pnpm run format:check"
      - name: "Run lint"
        run: "pnpm lint"
      - name: "Run publint"
        run: "pnpm build && pnpm lint:package"

  conventional-commits:
    name: "Lint Commit Messages"
    runs-on: "depot-ubuntu-24.04-small"
    if: "github.event_name == 'pull_request' && (github.event.action == 'opened' || github.event.action == 'synchronize' || github.event.action == 'reopened' || github.event.action == 'edited')"
    steps:
      - uses: "actions/checkout@v6"
      - uses: "webiny/action-conventional-commits@v1.4.2"
